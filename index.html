<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keensight Dropdown</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 50px; }

        /* The Container */
        .dropdown { position: relative; display: inline-block; }

        /* The Main Button */
        .drop-btn {
            background-color: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #24292f;
        }

        .drop-btn:hover { background-color: #f6f8fa; }

        /* The Hidden Menu */
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 280px;
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
            border: 1px solid #d0d7de;
            border-radius: 12px;
            z-index: 1;
            margin-top: 4px;
            padding: 8px;
        }

        /* Show the menu when active */
        .dropdown.active .dropdown-content { display: block; }

        /* Dropdown Items */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 10px;
            text-decoration: none;
            color: #24292f;
            border-radius: 6px;
            cursor: pointer;
            gap: 12px;
        }

        .menu-item:hover { background-color: #f6f8fa; }

        .item-text b { display: block; font-size: 14px; }
        .item-text span { font-size: 12px; color: #656d76; }

        .icon { width: 32px; height: 32px; background: #f0f0f0; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="dropdown" id="myDropdown">
        <button class="drop-btn" onclick="toggleMenu()">
            <span>📋 Copy Page</span>
            <small>▼</small>
        </button>
        
        <div class="dropdown-content">
            <div class="menu-item" onclick="copyContent('Markdown Text Here')">
                <div class="icon">M↓</div>
                <div class="item-text">
                    <b>Copy Raw Markdown</b>
                    <span>Copy page as Markdown for LLMs</span>
                </div>
            </div>

            <div class="menu-item" onclick="window.open('https://chatgpt.com', '_blank')">
                <div class="icon">GPT</div>
                <div class="item-text">
                    <b>Reference in ChatGPT</b>
                    <span>Ask questions about this page</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle the menu visibility
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("active");
        }

        // Copy function
        function copyContent(text) {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
            document.getElementById("myDropdown").classList.remove("active");
        }

        // Close menu if user clicks outside
        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                document.getElementById("myDropdown").classList.remove("active");
            }
        }
    </script>

</body>
</html>
